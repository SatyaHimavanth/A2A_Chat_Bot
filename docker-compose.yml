services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: a2a-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chatbot.db:/app/chatbot.db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: a2a-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
