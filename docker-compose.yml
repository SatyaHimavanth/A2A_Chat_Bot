services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: a2a-backend
    environment:
      DATABASE_URL: sqlite:///./chatbot.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      AGENT_STATUS_CHECK_TIMEOUT_SECONDS: ${AGENT_STATUS_CHECK_TIMEOUT_SECONDS:-12}
      AGENT_STATUS_CACHE_TTL_SECONDS: ${AGENT_STATUS_CACHE_TTL_SECONDS:-30}
      STREAM_CONNECT_TIMEOUT_SECONDS: ${STREAM_CONNECT_TIMEOUT_SECONDS:-60}
      STREAM_READ_TIMEOUT_SECONDS: ${STREAM_READ_TIMEOUT_SECONDS:-240}
    volumes:
      - ./backend/chatbot.db:/app/chatbot.db
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: a2a-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
